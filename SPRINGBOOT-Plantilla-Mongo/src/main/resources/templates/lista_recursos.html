<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Lista de Recursos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h1>Gestión de Recursos</h1>

<div sec:authorize="hasRole('ADMIN')" class="mb-3">
    <a th:href="@{/web/recursos/nuevo}" class="btn btn-primary">Nuevo Recurso</a>
</div>

<table class="table table-striped">
    <thead>
    <tr>
        <th>Nombre</th>
        <th>Tipo</th>
        <th>Cantidad</th>
        <th>Precio</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="recurso : ${listaRecursos}">
        <td th:text="${recurso.nombre}">Nombre</td>
        <td th:text="${recurso.tipo}">Tipo</td>
        <td th:text="${recurso.cantidad}">0</td>
        <td th:text="${recurso.precio}">0.0</td>
        <td>
            <div sec:authorize="hasRole('ADMIN')">
                <a th:href="@{/web/recursos/editar/{id}(id=${recurso.id})}" class="btn btn-sm btn-warning">Editar</a>
                <a th:href="@{/web/recursos/eliminar/{id}(id=${recurso.id})}" class="btn btn-sm btn-danger">Eliminar</a>
            </div>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
