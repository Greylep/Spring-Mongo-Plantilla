<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Recurso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
<h2 th:text="${idRecurso == null ? 'Nuevo Recurso' : 'Editar Recurso'}">Formulario</h2>

<form th:action="@{${idRecurso == null ? '/web/recursos/guardar' : '/web/recursos/actualizar/' + idRecurso}}"
      th:object="${recursoDTO}" method="post">

    <div class="mb-3">
        <label>Nombre:</label>
        <input type="text" th:field="*{nombre}" class="form-control" required/>
    </div>
    <div class="mb-3">
        <label>Tipo:</label>
        <input type="text" th:field="*{tipo}" class="form-control"/>
    </div>
    <div class="mb-3">
        <label>Cantidad:</label>
        <input type="number" th:field="*{cantidad}" class="form-control" required/>
    </div>
    <div class="mb-3">
        <label>Precio:</label>
        <input type="number" step="0.01" th:field="*{precio}" class="form-control"/>
    </div>

    <div class="mb-3">
        <label>Descripción Detalle:</label>
        <input type="text" th:field="*{detalle.descripcion}" class="form-control"/>
    </div>
    <div class="form-check mb-3">
        <input type="checkbox" th:field="*{detalle.activo}" class="form-check-input"/>
        <label class="form-check-label">Activo</label>
    </div>

    <button type="submit" class="btn btn-success">Guardar</button>
    <a th:href="@{/web/recursos}" class="btn btn-secondary">Cancelar</a>
</form>
</body>
</html>
